components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    opsBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Restricted operations token.
    webhookSignature:
      type: apiKey
      in: header
      name: X-Provider-Signature
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 8
        maxLength: 128
    RequestId:
      name: X-Request-Id
      in: header
      required: false
      schema:
        type: string
    ScenarioId:
      name: scenario_id
      in: path
      required: true
      schema:
        type: string
        enum:
        - job_interview
        - onboarding_introduction
    LevelCode:
      name: level_code
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/LevelCode'
    SessionId:
      name: session_id
      in: path
      required: true
      schema:
        type: string
    QueueItemId:
      name: queue_item_id
      in: path
      required: true
      schema:
        type: string
    ReviewItemId:
      name: review_item_id
      in: path
      required: true
      schema:
        type: string
    FavoriteId:
      name: favorite_id
      in: path
      required: true
      schema:
        type: string
    HistoryEntryId:
      name: history_entry_id
      in: path
      required: true
      schema:
        type: string
    MediaId:
      name: media_id
      in: path
      required: true
      schema:
        type: string
    JobId:
      name: job_id
      in: path
      required: true
      schema:
        type: string
  responses:
    BadRequest:
      description: Bad request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            default:
              $ref: '#/components/examples/ErrorResponseExample'
    Unauthenticated:
      description: Missing or invalid authentication.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            default:
              $ref: '#/components/examples/ErrorResponseExample'
    Forbidden:
      description: Authenticated but forbidden.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            default:
              $ref: '#/components/examples/ErrorResponseExample'
    EntitlementRequired:
      description: Paid entitlement or plan upgrade required.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            default:
              $ref: '#/components/examples/ErrorResponseExample'
    UsageLimitExceeded:
      description: Usage limit exceeded.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            default:
              $ref: '#/components/examples/ErrorResponseExample'
    InvalidReceipt:
      description: Invalid provider receipt or purchase token.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            default:
              $ref: '#/components/examples/ErrorResponseExample'
    IdempotencyConflict:
      description: Idempotency key reused with a different body.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            default:
              $ref: '#/components/examples/ErrorResponseExample'
    ValidationFailed:
      description: Schema validation failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            default:
              $ref: '#/components/examples/ErrorResponseExample'
    ProviderUnavailable:
      description: External provider unavailable.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            default:
              $ref: '#/components/examples/ErrorResponseExample'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            default:
              $ref: '#/components/examples/ErrorResponseExample'
    Conflict:
      description: Current state conflict.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            default:
              $ref: '#/components/examples/ErrorResponseExample'
  schemas:
    SchemaVersion:
      type: integer
      enum:
      - 1
    ErrorResponse:
      type: object
      required:
      - error
      properties:
        error:
          type: object
          required:
          - code
          - message
          - request_id
          properties:
            code:
              $ref: '#/components/schemas/ErrorCode'
            message:
              type: string
            request_id:
              type: string
            details:
              type: object
              additionalProperties: true
    ErrorCode:
      type: string
      enum:
      - UNAUTHENTICATED
      - FORBIDDEN
      - ENTITLEMENT_REQUIRED
      - USAGE_LIMIT_EXCEEDED
      - INVALID_RECEIPT
      - PRODUCT_MISMATCH
      - SUBSCRIPTION_EXPIRED
      - IDEMPOTENCY_CONFLICT
      - SCHEMA_VALIDATION_FAILED
      - PROVIDER_UNAVAILABLE
      - DELETE_IN_PROGRESS
      - RESOURCE_NOT_FOUND
      - CONFLICT
    LevelCode:
      type: string
      enum:
      - L1
      - L2
      - L3
    ScenarioId:
      type: string
      enum:
      - job_interview
      - onboarding_introduction
    AuthSessionResponse:
      type: object
      required:
      - schema_version
      - user
      - access_token
      - refresh_token
      - expires_at
      properties:
        schema_version:
          $ref: '#/components/schemas/SchemaVersion'
        user:
          $ref: '#/components/schemas/UserProfile'
        access_token:
          type: string
        refresh_token:
          type: string
        expires_at:
          type: string
          format: date-time
    PhoneLoginRequest:
      type: object
      required:
      - schema_version
      - phone_number
      - verification_code
      - terms_accepted
