  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 8
        maxLength: 128
    RequestId:
      name: X-Request-Id
      in: header
      required: false
      schema:
        type: string
    ScenarioId:
      name: scenario_id
      in: path
      required: true
      schema:
        type: string
        enum:
        - job_interview
        - onboarding_introduction
    LevelCode:
      name: level_code
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/LevelCode'
    SessionId:
      name: session_id
      in: path
      required: true
      schema:
        type: string
    ReviewItemId:
      name: review_item_id
      in: path
      required: true
      schema:
        type: string
    FavoriteId:
      name: favorite_id
      in: path
      required: true
      schema:
        type: string
    JobId:
      name: job_id
      in: path
      required: true
      schema:
        type: string
  responses:
    BadRequest:
      description: Bad request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            default:
              $ref: '#/components/examples/ErrorResponseExample'
    Unauthenticated:
      description: Missing or invalid authentication.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            default:
              $ref: '#/components/examples/ErrorResponseExample'
    Forbidden:
      description: Authenticated but forbidden.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            default:
              $ref: '#/components/examples/ErrorResponseExample'
    EntitlementRequired:
      description: Paid entitlement or plan upgrade required.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            default:
              $ref: '#/components/examples/ErrorResponseExample'
    UsageLimitExceeded:
      description: Usage limit exceeded.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            default:
              $ref: '#/components/examples/ErrorResponseExample'
    InvalidReceipt:
      description: Invalid provider receipt or purchase token.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            default:
              $ref: '#/components/examples/ErrorResponseExample'
    IdempotencyConflict:
      description: Idempotency key reused with a different body.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            default:
              $ref: '#/components/examples/ErrorResponseExample'
    ValidationFailed:
      description: Schema validation failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            default:
              $ref: '#/components/examples/ErrorResponseExample'
    ProviderUnavailable:
      description: External provider unavailable.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            default:
              $ref: '#/components/examples/ErrorResponseExample'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            default:
              $ref: '#/components/examples/ErrorResponseExample'
    Conflict:
      description: Current state conflict.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            default:
              $ref: '#/components/examples/ErrorResponseExample'
  schemas:
    SchemaVersion:
      type: integer
      enum:
      - 1
    ErrorResponse:
      type: object
      required:
      - error
      properties:
        error:
          type: object
          required:
          - code
          - message
          - request_id
          properties:
            code:
              $ref: '#/components/schemas/ErrorCode'
            message:
              type: string
            request_id:
              type: string
            details:
              type: object
              additionalProperties: true
    ErrorCode:
      type: string
      enum:
      - UNAUTHENTICATED
      - FORBIDDEN
      - ENTITLEMENT_REQUIRED
      - USAGE_LIMIT_EXCEEDED
      - INVALID_RECEIPT
      - PRODUCT_MISMATCH
      - SUBSCRIPTION_EXPIRED
      - IDEMPOTENCY_CONFLICT
      - SCHEMA_VALIDATION_FAILED
      - PROVIDER_UNAVAILABLE
      - DELETE_IN_PROGRESS
      - RESOURCE_NOT_FOUND
      - CONFLICT
    LevelCode:
      type: string
      enum:
      - L1
      - L2
      - L3
    ScenarioId:
      type: string
      enum:
      - job_interview
      - onboarding_introduction
    AuthSessionResponse:
      type: object
      required:
      - schema_version
      - user
      - access_token
      - refresh_token
      - expires_at
      properties:
        schema_version:
          $ref: '#/components/schemas/SchemaVersion'
        user:
          $ref: '#/components/schemas/UserProfile'
        access_token:
          type: string
        refresh_token:
          type: string
        expires_at:
          type: string
          format: date-time
    PhoneLoginRequest:
      type: object
      required:
      - schema_version
      - phone_number
      - verification_code
      - terms_accepted
      properties:
        schema_version:
          $ref: '#/components/schemas/SchemaVersion'
        phone_number:
          type: string
        verification_code:
          type: string
        terms_accepted:
          type: boolean
    SocialLoginRequest:
      type: object
      required:
      - schema_version
      - provider_token
      - terms_accepted
      properties:
        schema_version:
          $ref: '#/components/schemas/SchemaVersion'
        provider_token:
          type: string
        nonce:
          type: string
        terms_accepted:
          type: boolean
    RefreshTokenRequest:
      type: object
      required:
      - schema_version
      - refresh_token
      properties:
        schema_version:
          $ref: '#/components/schemas/SchemaVersion'
        refresh_token:
          type: string
    UserProfile:
      type: object
      required:
      - user_id
      - account_status
      - onboarding_status
      properties:
        user_id:
          type: string
        display_name:
          type: string
        avatar_ref:
          type: string
          nullable: true
        locale:
          type: string
          default: zh-CN
        target_level:
          $ref: '#/components/schemas/LevelCode'
        daily_minutes:
          type: integer
          minimum: 1
        account_status:
          type: string
          enum:
          - active
          - deletion_requested
          - deleted
          - disabled
        onboarding_status:
          type: string
          enum:
          - incomplete
          - complete
    UserProfileResponse:
      type: object
      required:
      - schema_version
      - user
      properties:
        schema_version:
          $ref: '#/components/schemas/SchemaVersion'
        user:
          $ref: '#/components/schemas/UserProfile'
    UpdateUserProfileRequest:
      type: object
      required:
      - schema_version
      properties:
        schema_version:
          $ref: '#/components/schemas/SchemaVersion'
        display_name:
          type: string
        target_level:
          $ref: '#/components/schemas/LevelCode'
        daily_minutes:
          type: integer
          minimum: 1
        reminder_enabled:
          type: boolean
        reminder_time:
          type: string
          pattern: ^([01][0-9]|2[0-3]):[0-5][0-9]$
    AccountDeletionJobResponse:
      type: object
      required:
      - schema_version
      - deletion_job_id
      - status
      properties:
        schema_version:
          $ref: '#/components/schemas/SchemaVersion'
        deletion_job_id:
          type: string
        status:
          type: string
          enum:
          - requested
          - access_revoked
          - deleting_learning_data
          - anonymizing_audit_refs
          - completed
          - failed
        requested_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
          nullable: true
    OnboardingAssessmentRequest:
      type: object
      required:
      - schema_version
      - goal_direction
      - pain_points
      - output_level
      - daily_minutes
      properties:
        schema_version:
          $ref: '#/components/schemas/SchemaVersion'
        goal_direction:
          type: string
          enum:
          - job_interview
          - onboarding_introduction
          - work_communication
          - daily_service
        pain_points:
          type: array
          items:
            type: string
        output_level:
          $ref: '#/components/schemas/LevelCode'
        daily_minutes:
          type: integer
          minimum: 1
    OnboardingAssessmentResponse:
      type: object
      required:
      - schema_version
      - route
      properties:
        schema_version:
          $ref: '#/components/schemas/SchemaVersion'
        route:
          $ref: '#/components/schemas/LearningRoute'
    LearningRoute:
      type: object
      required:
      - current_scenario_id
      - target_level
      - scenario_ids
      properties:
        current_scenario_id:
          $ref: '#/components/schemas/ScenarioId'
        target_level:
          $ref: '#/components/schemas/LevelCode'
        scenario_ids:
          type: array
          items:
            $ref: '#/components/schemas/ScenarioId'
    ScenarioListResponse:
      type: object
      required:
      - schema_version
      - scenarios
      properties:
        schema_version:
          $ref: '#/components/schemas/SchemaVersion'
        scenarios:
          type: array
          items:
            $ref: '#/components/schemas/ScenarioSummary'
    ScenarioResponse:
      type: object
      required:
      - schema_version
      - scenario
      properties:
        schema_version:
          $ref: '#/components/schemas/SchemaVersion'
        scenario:
          $ref: '#/components/schemas/ScenarioDetail'
    ScenarioSummary:
      type: object
      required:
      - scenario_id
      - title
      - status
      - access
      properties:
        scenario_id:
          $ref: '#/components/schemas/ScenarioId'
        title:
          type: string
        summary:
          type: string
        tags:
          type: array
          items:
            type: string
        levels:
          type: array
          items:
            $ref: '#/components/schemas/LevelCode'
        status:
          type: string
          enum:
          - available
          - hidden
        access:
          $ref: '#/components/schemas/AccessState'
    ScenarioDetail:
      allOf:
      - $ref: '#/components/schemas/ScenarioSummary'
      - type: object
        properties:
          version:
            type: string
          expression_count:
            type: integer
          joined:
            type: boolean
    AccessState:
      type: object
      required:
      - allowed
      properties:
        allowed:
          type: boolean
        reason_code:
          type: string
          nullable: true
          enum:
          - ENTITLEMENT_REQUIRED
          - SUBSCRIPTION_EXPIRED
          - USAGE_LIMIT_EXCEEDED
          - null
    ScenarioLevelResponse:
      type: object
      required:
      - schema_version
      - scenario_id
      - level_code
      - target_expressions
      properties:
        schema_version:
          $ref: '#/components/schemas/SchemaVersion'
        scenario_id:
          $ref: '#/components/schemas/ScenarioId'
        level_code:
          $ref: '#/components/schemas/LevelCode'
        dialogue_assets:
          type: array
          items:
            $ref: '#/components/schemas/DialogueAsset'
        target_expressions:
          type: array
          items:
            $ref: '#/components/schemas/TargetExpression'
        action_chain_steps:
          type: array
          items:
            $ref: '#/components/schemas/ActionChainStep'
    DialogueAsset:
      type: object
      required:
      - dialogue_asset_id
      - role
      - text
      - order_index
      properties:
        dialogue_asset_id:
          type: string
        role:
          type: string
          enum:
          - system
          - interviewer
          - candidate
          - coach
        text:
          type: string
        audio_ref:
          type: string
          nullable: true
        order_index:
          type: integer
    TargetExpression:
      type: object
      required:
      - target_expression_id
      - text
      properties:
        target_expression_id:
          type: string
        text:
          type: string
        meaning_cn:
          type: string
        tags:
          type: array
          items:
            type: string
    ActionChainStep:
      type: object
      required:
      - action_chain_step_id
      - step_key
      - learner_task
      - order_index
      properties:
        action_chain_step_id:
          type: string
        step_key:
          type: string
          enum:
          - opening
          - purpose
          - opinion
          - follow_up
          - next_step
          - closing
        learner_task:
          type: string
        success_condition:
          type: string
        order_index:
          type: integer
    StartSessionRequest:
      type: object
      required:
      - schema_version
      - scenario_id
      - level_code
      properties:
        schema_version:
          $ref: '#/components/schemas/SchemaVersion'
        scenario_id:
          $ref: '#/components/schemas/ScenarioId'
        level_code:
          $ref: '#/components/schemas/LevelCode'
        resume_existing:
          type: boolean
          default: true
    PracticeSessionResponse:
      type: object
      required:
      - schema_version
      - session
      properties:
        schema_version:
          $ref: '#/components/schemas/SchemaVersion'
        session:
          $ref: '#/components/schemas/PracticeSession'
    PracticeSession:
      type: object
      required:
      - session_id
      - scenario_id
      - level_code
      - status
      properties:
        session_id:
          type: string
        scenario_id:
          $ref: '#/components/schemas/ScenarioId'
        level_code:
          $ref: '#/components/schemas/LevelCode'
        status:
          type: string
          enum:
          - idle
          - recording
          - submitting
          - feedback
          - recoverable_error
          - completed
        current_turn_index:
          type: integer
        messages:
          type: array
          items:
            $ref: '#/components/schemas/ConversationMessage'
    SubmitTurnRequest:
      type: object
      required:
      - schema_version
      properties:
        schema_version:
          $ref: '#/components/schemas/SchemaVersion'
        transcript:
          type: string
        audio_ref:
          type: string
        client_state_version:
          type: integer
    PracticeTurnResponse:
      type: object
      required:
      - schema_version
      - session_id
      properties:
        schema_version:
          $ref: '#/components/schemas/SchemaVersion'
        session_id:
          type: string
        user_message:
          $ref: '#/components/schemas/ConversationMessage'
        coach_feedback:
          $ref: '#/components/schemas/CoachFeedback'
        learning_evidence_candidates:
          type: array
          items:
            $ref: '#/components/schemas/LearningEvidenceCandidate'
    ConversationMessage:
      type: object
      required:
      - message_id
      - role
      - text
      - created_at
      properties:
        message_id:
          type: string
        role:
          type: string
          enum:
          - learner
          - coach
          - system
          - scenario_partner
        text:
          type: string
        audio_ref:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
    CoachFeedback:
      type: object
      required:
      - summary
      properties:
        summary:
          type: string
        main_issue_type:
          type: string
        suggested_expression:
          type: string
        next_prompt:
          type: string
        score_signal:
          $ref: '#/components/schemas/ScoreSignal'
    ScoreSignal:
      type: object
      required:
      - score_kind
      - status
      properties:
        score_kind:
          type: string
          enum:
          - pronunciation
          - completeness
          - grammar
          - task_completion
        value:
          type: number
          minimum: 0
          maximum: 1
          nullable: true
        confidence:
          type: number
          minimum: 0
          maximum: 1
          nullable: true
        status:
          type: string
          enum:
          - available
          - low_confidence
          - unavailable
    SessionSummaryResponse:
      type: object
      required:
      - schema_version
      - summary
      properties:
        schema_version:
          $ref: '#/components/schemas/SchemaVersion'
        summary:
          $ref: '#/components/schemas/SessionSummary'
    SessionSummary:
      type: object
      required:
      - session_id
      - learned_items
      - weak_points
      - next_focus
      properties:
        session_id:
          type: string
        learned_items:
          type: array
          items:
            type: string
        weak_points:
          type: array
          items:
            type: string
        next_focus:
          type: string
    TrainingSessionResponse:
      type: object
      required:
      - schema_version
      - session
      properties:
        schema_version:
          $ref: '#/components/schemas/SchemaVersion'
        session:
          $ref: '#/components/schemas/TrainingSession'
    TrainingSession:
      type: object
      required:
      - session_id
      - scenario_id
      - level_code
      - status
      - current_micro_action
      properties:
        session_id:
          type: string
        scenario_id:
          $ref: '#/components/schemas/ScenarioId'
        level_code:
          $ref: '#/components/schemas/LevelCode'
        status:
          type: string
          enum:
          - loading
          - ready
          - in_progress
          - feedback
          - retry
          - pressure_check
          - recap
          - completed
          - recoverable_error
        current_action_step_id:
          type: string
        current_micro_action:
          $ref: '#/components/schemas/MicroAction'
        hint_state:
          $ref: '#/components/schemas/HintState'
    MicroAction:
      type: string
      enum:
      - ListenOne
      - ChooseOne
      - SayOne
      - ShadowOne
      - FillOne
      - ContinueUnderPrompt
    HintLevel:
      type: string
      enum:
      - none
      - sentence_frame
      - options
      - chunk_shadowing
      - model_then_retry
    HintState:
      type: object
      required:
      - current_hint_level
      - failure_count
      - success_count
      properties:
        current_hint_level:
          $ref: '#/components/schemas/HintLevel'
        failure_count:
          type: integer
          minimum: 0
        success_count:
          type: integer
          minimum: 0
    SubmitTrainingTurnRequest:
      type: object
      required:
      - schema_version
      - micro_action
      properties:
        schema_version:
          $ref: '#/components/schemas/SchemaVersion'
        micro_action:
          $ref: '#/components/schemas/MicroAction'
        transcript:
          type: string
        audio_ref:
          type: string
        selected_option_id:
          type: string
        client_state_version:
          type: integer
    TrainingTurnResponse:
      type: object
      required:
      - schema_version
      - session_id
      - planner_decision
      properties:
        schema_version:
          $ref: '#/components/schemas/SchemaVersion'
        session_id:
          type: string
        planner_decision:
          $ref: '#/components/schemas/PlannerDecision'
        coach_feedback:
          $ref: '#/components/schemas/CoachFeedback'
        learning_evidence_candidates:
          type: array
          items:
            $ref: '#/components/schemas/LearningEvidenceCandidate'
    PlannerDecisionResponse:
      type: object
      required:
      - schema_version
      - decision
      properties:
        schema_version:
          $ref: '#/components/schemas/SchemaVersion'
        decision:
          $ref: '#/components/schemas/PlannerDecision'
    PlannerDecision:
      type: object
      required:
      - decision_id
      - decision_type
      - next_micro_action
      - hint_level
      - reason_code
      properties:
        decision_id:
          type: string
        decision_type:
          type: string
          enum:
          - retry
          - downgrade
          - upgrade
          - next_action
          - pressure_check
          - recap
        next_micro_action:
          $ref: '#/components/schemas/MicroAction'
        hint_level:
          $ref: '#/components/schemas/HintLevel'
        reason_code:
          type: string
        pressure_check:
          type: boolean
    HintResponse:
      type: object
      required:
      - schema_version
      - hint_state
      - hint_content
      properties:
        schema_version:
          $ref: '#/components/schemas/SchemaVersion'
        hint_state:
          $ref: '#/components/schemas/HintState'
        hint_content:
          type: string
    PressureCheckResponse:
      type: object
      required:
      - schema_version
      - status
      - prompt
      properties:
        schema_version:
          $ref: '#/components/schemas/SchemaVersion'
        status:
          type: string
          enum:
          - ready
          - in_progress
          - passed
          - failed
        prompt:
          type: string
    TrainingRecapResponse:
      type: object
      required:
      - schema_version
      - recap
      properties:
        schema_version:
          $ref: '#/components/schemas/SchemaVersion'
        recap:
          $ref: '#/components/schemas/TrainingRecap'
    TrainingRecap:
      allOf:
      - $ref: '#/components/schemas/SessionSummary'
      - type: object
        properties:
          accepted_evidence_ids:
            type: array
            items:
              type: string
    LearningEvidenceCandidate:
      type: object
      required:
      - candidate_id
      - evidence_type
      - confidence
      - status
      properties:
        candidate_id:
          type: string
        evidence_type:
          type: string
          enum:
          - mastered_expression
          - weak_expression
          - correction
          - saved_expression
          - review_due
        target_expression_id:
          type: string
        text:
          type: string
        confidence:
          type: number
          minimum: 0
          maximum: 1
        status:
          type: string
          enum:
          - candidate
          - accepted
          - rejected
          - merged_duplicate
    CreateLearningEvidenceRequest:
      type: object
      required:
      - schema_version
      - source_type
      - source_id
      - evidence_type
      properties:
        schema_version:
          $ref: '#/components/schemas/SchemaVersion'
        source_type:
          type: string
          enum:
          - practice_turn
          - training_turn
          - review_result
          - correction
        source_id:
          type: string
        evidence_type:
          type: string
        target_expression_id:
          type: string
        confidence:
          type: number
          minimum: 0
          maximum: 1
        rule_trace:
          type: object
          additionalProperties: true
    LearningEvidenceResponse:
      type: object
      required:
      - schema_version
      - evidence
      properties:
        schema_version:
          $ref: '#/components/schemas/SchemaVersion'
        evidence:
          $ref: '#/components/schemas/LearningEvidence'
    LearningEvidenceListResponse:
      type: object
      required:
      - schema_version
      - evidence
      properties:
        schema_version:
          $ref: '#/components/schemas/SchemaVersion'
        evidence:
          type: array
          items:
            $ref: '#/components/schemas/LearningEvidence'
    LearningEvidence:
      type: object
      required:
      - evidence_id
      - evidence_type
      - accepted_status
      - created_at
      properties:
        evidence_id:
          type: string
        evidence_type:
          type: string
        target_expression_id:
          type: string
        confidence:
          type: number
          minimum: 0
          maximum: 1
        accepted_status:
          type: string
          enum:
          - accepted
          - rejected
          - merged_duplicate
        created_at:
          type: string
          format: date-time
    MasteryListResponse:
      type: object
      required:
      - schema_version
      - mastery_records
      properties:
        schema_version:
          $ref: '#/components/schemas/SchemaVersion'
        mastery_records:
          type: array
          items:
            $ref: '#/components/schemas/MasteryRecord'
    MasteryRecord:
      type: object
      required:
      - target_expression_id
      - mastery_status
      - updated_at
      properties:
        target_expression_id:
          type: string
        mastery_status:
          type: string
          enum:
          - new
          - practicing
          - weak
          - mastered
        score:
          type: number
          minimum: 0
          maximum: 1
        updated_at:
          type: string
          format: date-time
    ReviewItemListResponse:
      type: object
      required:
      - schema_version
      - review_items
      properties:
        schema_version:
          $ref: '#/components/schemas/SchemaVersion'
        review_items:
          type: array
          items:
            $ref: '#/components/schemas/ReviewItem'
    ReviewItemResponse:
      type: object
      required:
      - schema_version
      - review_item
      properties:
        schema_version:
          $ref: '#/components/schemas/SchemaVersion'
        review_item:
