      tags:
      - User
      operationId: updateMe
      summary: Update user profile preferences.
      x-traceability:
        product_objects:
        - product-base
        requirements:
        - FR-010
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserProfileRequest'
            examples:
              default:
                $ref: '#/components/examples/UpdateUserProfileRequestExample'
      responses:
        '200':
          description: Updated profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponse'
              examples:
                default:
                  $ref: '#/components/examples/UserProfileResponseExample'
        '422':
          $ref: '#/components/responses/ValidationFailed'
    delete:
      tags:
      - User
      operationId: requestAccountDeletion
      summary: Request account deletion and cloud data cleanup.
      x-idempotency-required: true
      x-traceability:
        product_objects:
        - product-base
        - p0-commercial-readiness
        requirements:
        - FR-010
        - FR-COM-008
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '202':
          description: Deletion job accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountDeletionJobResponse'
              examples:
                default:
                  $ref: '#/components/examples/AccountDeletionJobResponseExample'
        '409':
          $ref: '#/components/responses/Conflict'
    parameters:
    - $ref: '#/components/parameters/RequestId'
  /onboarding/assessment:
