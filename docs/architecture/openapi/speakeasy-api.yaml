      x-traceability:
        product_objects:
        - product-base
        - p0-commercial-readiness
        requirements:
        - FR-003
        - FR-COM-007
      parameters:
      - name: query
        in: query
        required: false
        schema:
          type: string
      - name: category
        in: query
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Scenario list.
          content:
            application/json:
              schema:
