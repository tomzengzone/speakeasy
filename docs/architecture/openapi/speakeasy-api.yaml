openapi: 3.0.3
info:
  title: SpeakEasy API
  version: 0.1.0
  description: 'Machine-readable OpenAPI source of truth for SpeakEasy server-backed Product Base behavior, P0 commercial
    subscription readiness, and P0.1 expression automation training. P0.2/P1/P2 roadmap items are intentionally
    excluded from implementation-level paths until they have owning increments.

    '
  license:
    name: Proprietary
servers:
- url: /v1
  description: Versioned API base path
security:
- bearerAuth: []
tags:
- name: Auth
  description: Login, refresh, and logout.
- name: User
  description: User profile and account lifecycle.
- name: Onboarding
  description: Assessment and initial learning route.
- name: Scenario
  description: Official scenario content and levels.
- name: Home
  description: Server-backed home summary and learning entry state.
- name: Practice
  description: Product Base voice scenario practice.
- name: Training
  description: P0.1 expression automation training sessions and turns.
- name: Planner
  description: P0.1 deterministic planner, hints, and pressure check.
- name: Learning
  description: Learning evidence, mastery, and history.
- name: Review
  description: Review queue and review result.
- name: Favorites
  description: Favorite and saved expressions.
- name: Entitlement
  description: Server-owned entitlement snapshots.
- name: Subscription
  description: Apple/Google purchase verification and restore.
- name: Usage
  description: Server-owned usage quota and reservation.
- name: AI Gateway
  description: Backend-isolated AI, ASR, TTS, and scoring calls.
- name: Media
  description: Backend-owned media upload, signing, and AI media lifecycle.
- name: AI Ops
  description: Restricted AI provider evidence, cost, budget, and retention operations.
- name: Admin
  description: Restricted audit, release health, and deletion retry.
x-product-scope:
  implementation_level:
  - product-base
  - p0-commercial-readiness
  - commercial-ai-provider-hardening
  - p0-1-expression-automation-training
  deferred_boundaries:
  - p0-2-training-memory
  - p1-notebook-vocabulary
  - p1-scoring-productization
  - p1-scenario-content-expansion
  - p2-a1-c2-cms
x-deferred-boundaries:
  p0_2:
    status: deferred
    reason: Stage exists but owning increment definition/spec is not approved.
    prohibited_endpoint_generation: true
  p1:
    status: deferred
    reason: Roadmap/future feature boundary only.
    prohibited_endpoint_generation: true
  p2:
    status: deferred
    reason: Roadmap/future feature boundary only.
    prohibited_endpoint_generation: true
paths:
  /auth/login/phone:
    post:
      tags:
      - Auth
      operationId: loginPhone
      summary: Login with phone verification code.
      security: []
      x-traceability:
        product_objects:
        - product-base
        - p0-commercial-readiness
        requirements:
        - FR-001
        - FR-COM-004
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PhoneLoginRequest'
            examples:
              default:
                $ref: '#/components/examples/PhoneLoginRequestExample'
      responses:
        '200':
          description: Auth session created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionResponse'
              examples:
                default:
                  $ref: '#/components/examples/AuthSessionResponseExample'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthenticated'
    parameters:
    - $ref: '#/components/parameters/RequestId'
  /auth/login/apple:
    post:
      tags:
      - Auth
      operationId: loginApple
      summary: Login with Apple identity token.
      security: []
      x-traceability:
        product_objects:
        - product-base
        - p0-commercial-readiness
        requirements:
        - FR-001
        - FR-COM-005
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SocialLoginRequest'
            examples:
              default:
                $ref: '#/components/examples/SocialLoginRequestExample'
      responses:
        '200':
          description: Auth session created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionResponse'
              examples:
                default:
                  $ref: '#/components/examples/AuthSessionResponseExample'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '503':
          $ref: '#/components/responses/ProviderUnavailable'
    parameters:
    - $ref: '#/components/parameters/RequestId'
  /auth/login/wechat:
    post:
      tags:
      - Auth
      operationId: loginWechat
      summary: Login with WeChat authorization code.
      security: []
      x-traceability:
        product_objects:
        - product-base
        - p0-commercial-readiness
        requirements:
        - FR-001
        - FR-COM-005
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SocialLoginRequest'
            examples:
              default:
                $ref: '#/components/examples/SocialLoginRequestExample'
      responses:
        '200':
          description: Auth session created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionResponse'
              examples:
                default:
                  $ref: '#/components/examples/AuthSessionResponseExample'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '503':
          $ref: '#/components/responses/ProviderUnavailable'
    parameters:
    - $ref: '#/components/parameters/RequestId'
  /auth/refresh:
    post:
      tags:
      - Auth
      operationId: refreshAuth
      summary: Refresh access token.
      security: []
      x-traceability:
        product_objects:
        - product-base
        - p0-commercial-readiness
        requirements:
        - FR-001
        - FR-COM-004
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
            examples:
              default:
                $ref: '#/components/examples/RefreshTokenRequestExample'
      responses:
        '200':
          description: Token refreshed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionResponse'
              examples:
                default:
                  $ref: '#/components/examples/AuthSessionResponseExample'
        '401':
          $ref: '#/components/responses/Unauthenticated'
    parameters:
    - $ref: '#/components/parameters/RequestId'
  /auth/logout:
    post:
      tags:
      - Auth
      operationId: logout
      summary: Logout current session.
      x-traceability:
        product_objects:
        - product-base
        requirements:
        - FR-001
        - FR-010
      responses:
        '204':
          description: Logout completed.
        '401':
          $ref: '#/components/responses/Unauthenticated'
    parameters:
    - $ref: '#/components/parameters/RequestId'
  /user/me:
    get:
      tags:
      - User
      operationId: getMe
      summary: Get current user profile and account state.
      x-traceability:
        product_objects:
        - product-base
        - p0-commercial-readiness
        requirements:
        - FR-010
        - FR-COM-004
      responses:
        '200':
          description: Current user profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponse'
              examples:
                default:
                  $ref: '#/components/examples/UserProfileResponseExample'
        '401':
          $ref: '#/components/responses/Unauthenticated'
    patch:
      tags:
      - User
      operationId: updateMe
      summary: Update user profile preferences.
      x-traceability:
        product_objects:
        - product-base
        requirements:
        - FR-010
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserProfileRequest'
            examples:
              default:
                $ref: '#/components/examples/UpdateUserProfileRequestExample'
      responses:
        '200':
          description: Updated profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponse'
              examples:
                default:
                  $ref: '#/components/examples/UserProfileResponseExample'
        '422':
          $ref: '#/components/responses/ValidationFailed'
    delete:
      tags:
      - User
      operationId: requestAccountDeletion
      summary: Request account deletion and cloud data cleanup.
      x-idempotency-required: true
      x-traceability:
        product_objects:
        - product-base
        - p0-commercial-readiness
        requirements:
        - FR-010
        - FR-COM-008
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '202':
          description: Deletion job accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountDeletionJobResponse'
              examples:
                default:
                  $ref: '#/components/examples/AccountDeletionJobResponseExample'
        '409':
          $ref: '#/components/responses/Conflict'
    parameters:
    - $ref: '#/components/parameters/RequestId'
  /user/deletion-status:
    get:
      tags:
      - User
      operationId: getAccountDeletionStatus
      summary: Get latest account deletion job status.
      x-traceability:
        product_objects:
        - mvp-backend-membership-boundary
        requirements:
        - MVP-BE-FR-011
      responses:
        '200':
          description: Latest deletion job status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountDeletionJobResponse'
              examples:
                default:
                  $ref: '#/components/examples/AccountDeletionJobResponseExample'
        '404':
          $ref: '#/components/responses/NotFound'
    parameters:
    - $ref: '#/components/parameters/RequestId'
  /onboarding/assessment:
    post:
      tags:
      - Onboarding
      operationId: submitOnboardingAssessment
      summary: Submit onboarding assessment and initial route.
      x-traceability:
        product_objects:
        - product-base
        requirements:
        - FR-002
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OnboardingAssessmentRequest'
            examples:
              default:
                $ref: '#/components/examples/OnboardingAssessmentRequestExample'
      responses:
        '200':
          description: Assessment completed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingAssessmentResponse'
              examples:
                default:
                  $ref: '#/components/examples/OnboardingAssessmentResponseExample'
        '422':
          $ref: '#/components/responses/ValidationFailed'
    parameters:
    - $ref: '#/components/parameters/RequestId'
  /scenarios:
    get:
      tags:
      - Scenario
      operationId: listScenarios
      summary: List official scenarios visible to current user.
      x-traceability:
        product_objects:
        - product-base
        - p0-commercial-readiness
        requirements:
        - FR-003
        - FR-COM-007
      parameters:
      - name: query
        in: query
        required: false
        schema:
          type: string
      - name: category
        in: query
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Scenario list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScenarioListResponse'
              examples:
                default:
                  $ref: '#/components/examples/ScenarioListResponseExample'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                default:
                  $ref: '#/components/examples/ErrorResponseExample'
    parameters:
    - $ref: '#/components/parameters/RequestId'
  /scenarios/{scenario_id}:
    get:
      tags:
      - Scenario
      operationId: getScenario
      summary: Get official scenario detail.
      x-traceability:
        product_objects:
        - product-base
        - p0-commercial-readiness
        requirements:
        - FR-003
        - FR-COM-007
      parameters:
      - $ref: '#/components/parameters/ScenarioId'
      responses:
        '200':
          description: Scenario detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScenarioResponse'
              examples:
                default:
                  $ref: '#/components/examples/ScenarioResponseExample'
        '404':
          $ref: '#/components/responses/NotFound'
    parameters:
    - $ref: '#/components/parameters/RequestId'
  /scenarios/{scenario_id}/levels/{level_code}:
    get:
      tags:
      - Scenario
      operationId: getScenarioLevel
      summary: Get scenario level content.
      x-traceability:
        product_objects:
        - product-base
        - p0-1-expression-automation-training
        requirements:
        - FR-003
        - FR-004
        - P01-FR-001
        - P01-FR-002
      parameters:
      - $ref: '#/components/parameters/ScenarioId'
      - $ref: '#/components/parameters/LevelCode'
      responses:
        '200':
          description: Scenario level content.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScenarioLevelResponse'
              examples:
                default:
                  $ref: '#/components/examples/ScenarioLevelResponseExample'
        '403':
          $ref: '#/components/responses/EntitlementRequired'
        '404':
          $ref: '#/components/responses/NotFound'
    parameters:
    - $ref: '#/components/parameters/RequestId'
  /user/scenarios/{scenario_id}:
    put:
      tags:
      - Scenario
      operationId: joinScenario
      summary: Join an official scenario and optionally make it current.
      x-traceability:
        product_objects:
        - product-base
        requirements:
        - FR-003
        - FR-005
      parameters:
      - $ref: '#/components/parameters/ScenarioId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserScenarioStateRequest'
            examples:
              default:
                $ref: '#/components/examples/UserScenarioStateRequestExample'
      responses:
        '200':
          description: User scenario state after join.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserScenarioStateResponse'
              examples:
                default:
                  $ref: '#/components/examples/UserScenarioStateResponseExample'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationFailed'
    delete:
      tags:
      - Scenario
      operationId: removeScenario
      summary: Remove an official scenario from the user's active learning state.
      x-traceability:
        product_objects:
        - product-base
        requirements:
        - FR-003
        - FR-005
      parameters:
      - $ref: '#/components/parameters/ScenarioId'
      responses:
        '200':
          description: User scenario state after removal.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserScenarioStateResponse'
              examples:
                default:
                  $ref: '#/components/examples/UserScenarioRemovedResponseExample'
        '404':
          $ref: '#/components/responses/NotFound'
    parameters:
    - $ref: '#/components/parameters/RequestId'
  /user/scenarios/current:
    patch:
      tags:
      - Scenario
      operationId: setCurrentScenario
      summary: Set the current scenario and target level for practice entry.
      x-traceability:
        product_objects:
        - product-base
        requirements:
        - FR-003
        - FR-005
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CurrentScenarioRequest'
            examples:
              default:
                $ref: '#/components/examples/CurrentScenarioRequestExample'
      responses:
        '200':
          description: Current user scenario state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserScenarioStateResponse'
              examples:
                default:
                  $ref: '#/components/examples/UserScenarioStateResponseExample'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationFailed'
    parameters:
    - $ref: '#/components/parameters/RequestId'
  /home/summary:
    get:
      tags:
      - Home
      operationId: getHomeSummary
      summary: Get server-backed home state for current scenario and next action.
      x-traceability:
        product_objects:
        - product-base
        requirements:
        - FR-002
        - FR-003
        - FR-005
      responses:
        '200':
          description: Home learning summary.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HomeSummaryResponse'
              examples:
                default:
                  $ref: '#/components/examples/HomeSummaryResponseExample'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                default:
                  $ref: '#/components/examples/ErrorResponseExample'
    parameters:
    - $ref: '#/components/parameters/RequestId'
  /practice/sessions:
    post:
      tags:
      - Practice
      operationId: startPracticeSession
      summary: Start or resume Product Base voice practice session.
      x-traceability:
        product_objects:
        - product-base
        requirements:
        - FR-007
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartSessionRequest'
            examples:
              default:
                $ref: '#/components/examples/StartSessionRequestExample'
      responses:
        '200':
          description: Practice session started or resumed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PracticeSessionResponse'
              examples:
                default:
                  $ref: '#/components/examples/PracticeSessionResponseExample'
        '422':
          description: Request validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                default:
                  $ref: '#/components/examples/ErrorResponseExample'
    parameters:
    - $ref: '#/components/parameters/RequestId'
  /practice/sessions/{session_id}:
    get:
      tags:
      - Practice
      operationId: getPracticeSession
      summary: Get Product Base practice session.
      x-traceability:
        product_objects:
        - product-base
        requirements:
        - FR-007
      parameters:
      - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Practice session state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PracticeSessionResponse'
              examples:
                default:
                  $ref: '#/components/examples/PracticeSessionResponseExample'
        '404':
          $ref: '#/components/responses/NotFound'
    parameters:
    - $ref: '#/components/parameters/RequestId'
  /practice/sessions/{session_id}/turns:
    post:
      tags:
      - Practice
      operationId: submitPracticeTurn
      summary: Submit a Product Base practice turn.
      x-idempotency-required: true
      x-traceability:
        product_objects:
        - product-base
        requirements:
        - FR-007
        - FR-008
        - FR-009
      parameters:
      - $ref: '#/components/parameters/SessionId'
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitTurnRequest'
            examples:
              default:
                $ref: '#/components/examples/SubmitTurnRequestExample'
      responses:
        '200':
          description: Practice turn accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PracticeTurnResponse'
              examples:
                default:
                  $ref: '#/components/examples/PracticeTurnResponseExample'
        '409':
          $ref: '#/components/responses/IdempotencyConflict'
    parameters:
    - $ref: '#/components/parameters/RequestId'
  /practice/sessions/{session_id}/complete:
    post:
      tags:
      - Practice
      operationId: completePracticeSession
      summary: Complete Product Base practice session and return summary.
      x-traceability:
        product_objects:
        - product-base
        requirements:
        - FR-009
      parameters:
      - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Practice session completed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionSummaryResponse'
              examples:
                default:
                  $ref: '#/components/examples/SessionSummaryResponseExample'
        '404':
          description: Referenced resource not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                default:
                  $ref: '#/components/examples/ErrorResponseExample'
    parameters:
    - $ref: '#/components/parameters/RequestId'
  /training/sessions:
    post:
      tags:
      - Training
      operationId: startTrainingSession
      summary: Start or resume P0.1 training session.
      x-traceability:
        product_objects:
        - p0-1-expression-automation-training
        requirements:
        - P01-FR-001
        - P01-FR-003
        - P01-FR-004
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartSessionRequest'
            examples:
              default:
                $ref: '#/components/examples/StartSessionRequestExample'
      responses:
        '200':
          description: Training session started or resumed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainingSessionResponse'
              examples:
                default:
                  $ref: '#/components/examples/TrainingSessionResponseExample'
        '422':
          description: Request validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                default:
                  $ref: '#/components/examples/ErrorResponseExample'
    parameters:
    - $ref: '#/components/parameters/RequestId'
  /training/sessions/{session_id}:
    get:
      tags:
      - Training
      operationId: getTrainingSession
      summary: Get P0.1 training session state.
      x-traceability:
        product_objects:
        - p0-1-expression-automation-training
        requirements:
        - P01-FR-001
        - P01-FR-010
      parameters:
      - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Training session state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainingSessionResponse'
              examples:
                default:
                  $ref: '#/components/examples/TrainingSessionResponseExample'
        '404':
          description: Referenced resource not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                default:
                  $ref: '#/components/examples/ErrorResponseExample'
    parameters:
    - $ref: '#/components/parameters/RequestId'
  /training/sessions/{session_id}/turns:
    post:
      tags:
      - Training
      operationId: submitTrainingTurn
      summary: Submit one P0.1 micro-action attempt.
      x-idempotency-required: true
      x-traceability:
        product_objects:
        - p0-1-expression-automation-training
        requirements:
        - P01-FR-003
        - P01-FR-006
        - P01-FR-007
        - P01-FR-009
      parameters:
      - $ref: '#/components/parameters/SessionId'
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitTrainingTurnRequest'
            examples:
              default:
                $ref: '#/components/examples/SubmitTrainingTurnRequestExample'
      responses:
        '200':
          description: Training turn accepted and next action returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainingTurnResponse'
              examples:
                default:
                  $ref: '#/components/examples/TrainingTurnResponseExample'
        '409':
          $ref: '#/components/responses/IdempotencyConflict'
    parameters:
    - $ref: '#/components/parameters/RequestId'
  /training/sessions/{session_id}/planner/next:
    post:
      tags:
      - Planner
      operationId: getPlannerNext
      summary: Ask deterministic planner for next micro-action.
      x-traceability:
        product_objects:
        - p0-1-expression-automation-training
        requirements:
        - P01-FR-004
        - P01-FR-005
        - P01-FR-008
      parameters:
      - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Planner decision.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlannerDecisionResponse'
              examples:
                default:
                  $ref: '#/components/examples/PlannerDecisionResponseExample'
        '404':
          description: Referenced resource not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                default:
                  $ref: '#/components/examples/ErrorResponseExample'
    parameters:
    - $ref: '#/components/parameters/RequestId'
  /training/sessions/{session_id}/hints:
    post:
      tags:
      - Planner
      operationId: requestTrainingHint
      summary: Request current hint ladder output.
      x-traceability:
