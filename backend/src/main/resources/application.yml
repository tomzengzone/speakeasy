spring:
  application:
    name: speakeasy-backend
  datasource:
    url: ${SPEAKEASY_DB_URL:jdbc:postgresql://localhost:5432/speakeasy}
    username: ${SPEAKEASY_DB_USERNAME:speakeasy}
    password: ${SPEAKEASY_DB_PASSWORD:speakeasy}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  jackson:
    property-naming-strategy: SNAKE_CASE

server:
  servlet:
    context-path: /v1
