name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  FLUTTER_VERSION: "3.x"
  JAVA_VERSION: "17"
  APP_API_BASE_URL: ${{ secrets.APP_API_BASE_URL }}
  ENV: production
  ENABLE_TEST_PHONE_LOGIN: "false"
  SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
  WECHAT_APP_ID: ${{ secrets.WECHAT_APP_ID }}
  WECHAT_UNIVERSAL_LINK: ${{ secrets.WECHAT_UNIVERSAL_LINK }}
  ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
  ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
  ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
  ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
  APPLE_SANDBOX_EVIDENCE_REF: ${{ vars.APPLE_SANDBOX_EVIDENCE_REF }}
  GOOGLE_PLAY_INTERNAL_EVIDENCE_REF: ${{ vars.GOOGLE_PLAY_INTERNAL_EVIDENCE_REF }}
  STORE_METADATA_EVIDENCE_REF: ${{ vars.STORE_METADATA_EVIDENCE_REF }}
  REVIEWER_ACCOUNT_REF: ${{ vars.REVIEWER_ACCOUNT_REF }}
  SYMBOL_UPLOAD_EVIDENCE_REF: ${{ vars.SYMBOL_UPLOAD_EVIDENCE_REF }}
  ROLLBACK_REHEARSAL_REF: ${{ vars.ROLLBACK_REHEARSAL_REF }}
  PRIVACY_URL: ${{ vars.PRIVACY_URL }}
  SUPPORT_URL: ${{ vars.SUPPORT_URL }}

jobs:
  build-release:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/*.kts', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Required for store release:
      # - APP_API_BASE_URL: production API base URL.
      # - ANDROID_KEYSTORE_BASE64: base64-encoded release keystore (.jks/.keystore)
      # - ANDROID_KEYSTORE_PASSWORD: keystore password
      # - ANDROID_KEY_ALIAS: key alias
      # - ANDROID_KEY_PASSWORD: key password

      - name: Commercial release readiness gate
        run: scripts/check_release_readiness.sh

      - name: Configure Android signing
        shell: bash
        run: |
          if [[ -z "$ANDROID_KEYSTORE_BASE64" ]]; then
            echo "ANDROID_KEYSTORE_BASE64 is required for release builds" >&2
            exit 1
          fi
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          cat <<EOF > android/key.properties
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          storeFile=upload-keystore.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android APK
        shell: bash
        run: |
          if [[ -z "$APP_API_BASE_URL" ]]; then
            echo "APP_API_BASE_URL is required for release builds" >&2
            exit 1
          fi
          flutter build apk --release \
            --dart-define=API_BASE_URL="$APP_API_BASE_URL" \
            --dart-define=ENV=production \
            --dart-define=SENTRY_DSN="$SENTRY_DSN" \
            --dart-define=WECHAT_APP_ID="$WECHAT_APP_ID" \
            --dart-define=WECHAT_UNIVERSAL_LINK="$WECHAT_UNIVERSAL_LINK"

      - name: Build Android App Bundle
        shell: bash
        run: |
          flutter build appbundle --release \
            --dart-define=API_BASE_URL="$APP_API_BASE_URL" \
            --dart-define=ENV=production \
            --dart-define=SENTRY_DSN="$SENTRY_DSN" \
            --dart-define=WECHAT_APP_ID="$WECHAT_APP_ID" \
            --dart-define=WECHAT_UNIVERSAL_LINK="$WECHAT_UNIVERSAL_LINK"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: speakeasy-${{ github.ref_name }}
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 30
