name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FLUTTER_VERSION: "3.x"
  JAVA_VERSION: "17"
  APP_API_BASE_URL: ${{ secrets.APP_API_BASE_URL }}

jobs:
  flutter-ci:
    name: Flutter Analyze Test Build
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Governance contract validation
        run: python3 scripts/validate_governance_contracts.py

      - name: Story-slice delivery validation
        run: python3 scripts/validate_story_slice_delivery.py

      - name: Story-slice cutover validation
        run: |
          python3 scripts/validate_story_slice_cutover.py
          python3 scripts/validate_story_slice_cutover.py --check-adr --check-story-map

      - name: Agent and skill validation
        run: python3 scripts/validate_agent_skills.py

      - name: Governance validator tests
        run: |
          python3 -m unittest \
            tests.test_validate_governance_contracts \
            tests.test_validate_story_slice_delivery \
            tests.test_validate_story_slice_cutover \
            -v

      - name: Capability registry validation
        run: |
          python3 scripts/validate_capability_registry.py
          python3 -m unittest discover -s tests -p "test_validate_capability_registry.py" -v

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/*.kts', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build Android APK
        shell: bash
        run: |
          API_BASE_URL="${APP_API_BASE_URL:-https://example.invalid}"
          flutter build apk --debug \
            --dart-define=API_BASE_URL="$API_BASE_URL" \
            --dart-define=ENV=ci
