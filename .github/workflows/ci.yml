name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FLUTTER_VERSION: "3.x"
  JAVA_VERSION: "17"

jobs:
  flutter-ci:
    name: Flutter Analyze Test Build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/*.kts', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Optional GitHub Secrets placeholders:
      # - APP_ENV_FILE: production .env content
      # - APP_ENV_DEV_FILE: development .env.dev content
      - name: Prepare environment files
        shell: bash
        run: |
          if [[ -n "${{ secrets.APP_ENV_FILE }}" ]]; then
            printf '%s' "${{ secrets.APP_ENV_FILE }}" > .env
          else
            cat <<'EOF' > .env
          API_BASE_URL=https://example.invalid
          OPENAI_API_KEY=ci-placeholder
          ENV=production
          EOF
          fi

          if [[ -n "${{ secrets.APP_ENV_DEV_FILE }}" ]]; then
            printf '%s' "${{ secrets.APP_ENV_DEV_FILE }}" > .env.dev
          else
            cat <<'EOF' > .env.dev
          API_BASE_URL=https://example.invalid
          OPENAI_API_KEY=ci-placeholder
          ENV=development
          EOF
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build Android APK
        run: flutter build apk --debug
