name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FLUTTER_VERSION: "3.x"
  JAVA_VERSION: "17"
  APP_API_BASE_URL: ${{ secrets.APP_API_BASE_URL }}

jobs:
  flutter-ci:
    name: Flutter Analyze Test Build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Governance contract validation
        id: governance-contracts
        run: python3 scripts/validate_governance_contracts.py

      - name: Agent and skill validation
        id: agent-skills
        run: python3 scripts/validate_agent_skills.py

      - name: Governance validator tests
        id: governance-validator-tests
        run: python3 -m unittest tests.test_validate_governance_contracts -v

      - name: Governance changed-files scope
        id: governance-write-scope
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_REF="${{ github.event.pull_request.base.sha }}"
          else
            BASE_REF="${{ github.event.before }}"
          fi
          mapfile -t CHANGED < <(git diff --name-only "$BASE_REF"...HEAD)
          if (( ${#CHANGED[@]} )); then
            python3 scripts/check_governance_write_scope.py \
              --governed-only \
              --github-event-path "$GITHUB_EVENT_PATH" \
              --base-ref "$BASE_REF" \
              "${CHANGED[@]}"
          fi

      - name: Restore pull request merge checkout
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Cross-cutting boundary check
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_REF="${{ github.event.pull_request.base.sha }}"
          else
            BASE_REF="${{ github.event.before }}"
          fi
          python3 scripts/check_cross_cutting_boundaries.py --scope changed --base-ref "$BASE_REF"

      - name: SWC allocation gate
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_REF="${{ github.event.pull_request.base.sha }}"
          else
            BASE_REF="${{ github.event.before }}"
          fi
          python3 scripts/check_swc_allocation.py --scope changed --base-ref "$BASE_REF"

      - name: Document language gate
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_REF="${{ github.event.pull_request.base.sha }}"
          else
            BASE_REF="${{ github.event.before }}"
          fi
          python3 scripts/check_document_language.py --scope changed --base-ref "$BASE_REF"

      - name: Capability registry gate
        shell: bash
        run: |
          python3 scripts/validate_capability_registry.py
          python3 -m unittest discover -s tests -p "test_validate_capability_registry.py" -v

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/*.kts', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build Android APK
        shell: bash
        run: |
          API_BASE_URL="${APP_API_BASE_URL:-https://example.invalid}"
          flutter build apk --debug \
            --dart-define=API_BASE_URL="$API_BASE_URL" \
            --dart-define=ENV=ci
